<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Data Grid</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6 font-sans">

    <div class="max-w-4xl mx-auto bg-white shadow-lg rounded-lg overflow-hidden">

        <h1 class="text-2xl font-bold text-gray-800 p-6 border-b">Product Inventory</h1>

        <div class="hidden md:grid md:grid-cols-4 gap-4 bg-gray-100 p-4 font-bold text-gray-600 border-b uppercase text-sm tracking-wider">
            <div>Product Name</div>
            <div>ID</div>
            <div>Price</div>
            <div>Stock Status</div>
        </div>

        <div id="product-list"></div>

    </div>

    <script src="assets/js/list-1.js"></script>
</body>
</html>
