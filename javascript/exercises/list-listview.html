<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product ListView (Tailwind)</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Optional: tweak Tailwind defaults via CDN config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          boxShadow: {
            soft: "0 10px 30px rgba(0,0,0,0.35)"
          }
        }
      }
    }
  </script>

  <!-- Load JS after HTML is parsed -->
  <script defer src="list-listview.js"></script>
</head>

<body class="min-h-screen bg-slate-950 text-slate-100 antialiased">
  <main class="mx-auto max-w-5xl px-4 py-10 sm:px-6">
    <header class="mb-6">
      <h1 class="text-xl font-semibold tracking-tight sm:text-2xl">Products</h1>
      <p class="mt-1 text-sm text-slate-400">Responsive listview (desktop columns, mobile stacked).</p>
    </header>

    <section class="rounded-2xl border border-slate-800 bg-slate-900/40 shadow-soft">
      <!-- Desktop column labels (hidden on mobile) -->
      <div
        class="hidden md:grid md:grid-cols-12 md:gap-4 border-b border-slate-800 px-4 py-3 text-xs font-semibold uppercase tracking-wider text-slate-400"
        aria-hidden="true"
      >
        <div class="md:col-span-6">Name</div>
        <div class="md:col-span-3">Price</div>
        <div class="md:col-span-3">Availability</div>
      </div>

      <!-- List container (items injected by JS) -->
      <div id="productList" class="divide-y divide-slate-800"></div>
    </section>

    <footer class="mt-6 text-xs text-slate-500">
      Tip: Resize the browser to see the layout switch at <span class="font-semibold text-slate-300">md</span>.
    </footer>
  </main>
</body>
</html>
