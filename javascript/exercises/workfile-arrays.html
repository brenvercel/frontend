<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <script>

    // Creating an array of objects
    const arrProducts = [
        {
            productID: 1001,
            name: "Laptop",
            price: 999.99,
            inStock: true
        },
        {
            productID: 1002,
            name: "Mouse",
            price: 24.99,
            inStock: true
        },
        {
            productID: 1003,
            name: "Keyboard",
            price: 59.99,
            inStock: false
        }
    ];
    console.log(arrProducts);


// Creating an array with objects on a single line
// Creating an array with objects on a single line
const arrUsers = [
    { firstName: "Alice", age: 25, city: "New York", isActive: true },
    { firstName: "Bob", age: 30, city: "Los Angeles", isActive: false },
    { firstName: "Charlie", age: 35, city: "Chicago", isActive: true }
];
console.log(arrUsers);



// Displaying some data from the arrProducts array of objects
console.log(`ID of product 0: ${arrProducts[0].productID}`); // 1001
console.log(`Name of product 1: ${arrProducts[1].name}`); // Mouse
console.log(`Price of product 2: ${arrProducts[2].price}`); // 59.99

// Accessing the first user's properties
console.log(`First user: ${arrUsers[0].firstName} ${arrUsers[0].lastName}`);

// Accessing the second user's age property
console.log(`Second user's age: ${arrUsers[1].age}`);

// Checking if the third user is active
console.log(`Is the third user active? ${arrUsers[2].isActive}`);




    // Loop through arrProducts and output formatted data
    arrProducts.forEach(product => {
        console.log("Product Details:");
        console.log(`ID: ${product.productID}`);
        console.log(`Name: ${product.name}`);
        console.log(`Price: ${product.price}`);
        console.log(`In Stock: ${product.inStock}`);
        console.log("---------------"); // Separator between products
    });


    // Loop through arrUsers and output formatted data
arrUsers.forEach(user => {
    console.log("User Details:");
    console.log(`First Name: ${user.firstName}`);
    console.log(`Age: ${user.age}`);
    console.log(`City: ${user.city}`);
    console.log(`Active?: ${user.isActive}`);
    console.log("**************"); // Separator between users
});


    // Reformat output from arrProducts
    arrProducts.forEach(product => {
        console.log(`Product: ${product.name.toUpperCase()} (ID: ${product.productID}) €${product.price}`);
        const discountedPrice = (product.price * 0.9).toFixed(2);
        console.log(`Price: €${product.price}, Discounted Price: €${discountedPrice}`);
        // Variable to hold stock status
        let stockStatus;
        // Determine stock status using if...else
        if (product.inStock) { // returns true or false
            stockStatus = '✓ Currently Available';
        } else {
            stockStatus = '✗ Out of Stock';
        }
        console.log(`In Stock? ${stockStatus}`);
        console.log("---------------"); // Separator between products
    });

    </script>
    
</body>
</html>
