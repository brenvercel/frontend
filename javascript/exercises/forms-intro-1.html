<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f0f2f5;
    margin: 0;
    padding: 0;
}

h1 {
    text-align: center;
    margin-top: 40px;
    color: #333;
}

/* Form container */
.label-above {
    max-width: 480px;
    margin: 40px auto;
    padding: 32px;
    background-color: #f9f9f9;
    border: 1px solid #ddd;
    border-radius: 8px;
}

/* Each label/input pair */
.form-group {
    display: flex;
    flex-direction: column;
    margin-bottom: 20px;
}

/* Labels above their fields */
.form-group label {
    font-weight: bold;
    margin-bottom: 6px;
    color: #333;
}

/* Input fields */
.form-group input {
    padding: 10px 12px;
    font-size: 1rem;
    border: 1px solid #ccc;
    border-radius: 5px;
    outline: none;
    transition: border-color 0.2s ease;
}

.form-group input:focus {
    border-color: #007BFF;
}

/* Error messages — hidden by default */
.error-text {
    margin-top: 6px;
    font-size: 0.875rem;
    color: #dc3545;
    display: none;
}

/* Submit button */
button[type="submit"] {
    display: block;
    width: 100%;
    padding: 12px;
    font-size: 1rem;
    font-weight: bold;
    color: #fff;
    background-color: #007BFF;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    transition: background-color 0.2s ease;
}

button[type="submit"]:hover {
    background-color: #0056b3;
}
</style>

    <script src="forms-intro-1.js" defer></script>
</head>
<body>
    

    <h1>Student Sign-in Form</h1>
<form id="myBigForm" class="label-above">
   <div class="form-group">
      <label for="firstName">First Name:</label>
      <input type="text" id="firstName" name="firstName" placeholder="e.g., John" required>
      <span id="firstNameError" class="error-text">First name is required.</span>
   </div>

   <div class="form-group">
      <label for="lastName">Last Name:</label>
      <input type="text" id="lastName" name="lastName" placeholder="e.g., Smith" required>
      <span id="lastNameError" class="error-text">Last name is required.</span>
   </div>

   <div class="form-group">
    <label for="email">Email:</label>
    <input type="email" id="email" name="email" placeholder="e.g., [email protected]" required>
    <span id="emailError" class="error-text">Please enter a valid email address.</span>
</div>

<div class="form-group">
    <label for="password">Password:</label>
    <input type="password" id="password" name="password" placeholder="Enter your password" required>
    <span id="passwordError" class="error-text">Password must be at least 8 characters.</span>
</div>

<div class="form-group">
    <label for="studentId">Student ID:</label>
    <input type="number" id="studentId" name="studentId" placeholder="5-digit ID (10000-99999)" required>
    <span id="studentIdError" class="error-text">ID must be in range 10000-99999</span>
</div>

   <button type="submit">Submit</button>
</form>
</body>
</html>
